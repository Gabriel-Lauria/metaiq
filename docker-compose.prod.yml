version: '3.9'

services:
  # PostgreSQL - Banco de Dados Principal
  postgres:
    image: postgres:16-alpine
    container_name: metaiq-postgres
    restart: always
    
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c max_connections=200 -c default_transaction_isolation=read_committed"
    
    volumes:
      - metaiq-postgres-data:/var/lib/postgresql/data
      - ./backups:/backups
    
    ports:
      - "127.0.0.1:5432:5432"  # Apenas localhost
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    
    networks:
      - metaiq-network
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis - Cache e Session Storage
  redis:
    image: redis:7-alpine
    container_name: metaiq-redis
    restart: always
    
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    
    volumes:
      - metaiq-redis-data:/data
    
    ports:
      - "127.0.0.1:6379:6379"  # Apenas localhost
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    
    networks:
      - metaiq-network
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backend NestJS API
  backend:
    build:
      context: ./metaiq-backend
      dockerfile: Dockerfile.prod
      args:
        - NODE_ENV=production
    
    container_name: metaiq-backend
    restart: always
    
    env_file: 
      - .env.prod
    
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      NODE_ENV: production
    
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    ports:
      - "127.0.0.1:3004:3004"  # Apenas localhost (atrás do Nginx)
    
    volumes:
      - ./metaiq-backend/uploads:/app/uploads
      - ./logs/backend:/app/logs
    
    networks:
      - metaiq-network
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3004/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Frontend Angular (Nginx)
  frontend:
    build:
      context: ./metaiq-frontend
      dockerfile: Dockerfile.prod
      args:
        - NODE_ENV=production
        - API_URL=${BACKEND_URL}
    
    container_name: metaiq-frontend
    restart: always
    
    ports:
      - "127.0.0.1:3000:80"  # Apenas localhost (atrás do Nginx reverse proxy)
    
    volumes:
      - ./nginx/nginx-frontend.conf:/etc/nginx/nginx.conf:ro
    
    networks:
      - metaiq-network
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # Nginx - Reverse Proxy com SSL
  nginx:
    image: nginx:alpine
    container_name: metaiq-nginx
    restart: always
    
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    
    depends_on:
      - backend
      - frontend
    
    networks:
      - metaiq-network
    
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

networks:
  metaiq-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  metaiq-postgres-data:
    driver: local
  metaiq-redis-data:
    driver: local

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MetaIQ - Dashboard Test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1a2847 100%);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 40px;
      max-width: 600px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    h1 {
      color: #6ee7f7;
      margin-bottom: 20px;
      font-size: 28px;
    }
    
    .status-item {
      padding: 12px;
      margin: 10px 0;
      background: #0f172a;
      border-left: 4px solid #6ee7f7;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .status-label {
      color: #94a3b8;
    }
    
    .status-value {
      color: #34d399;
      font-weight: 600;
      font-family: 'Space Mono', monospace;
    }
    
    .error {
      border-left-color: #fc8181 !important;
    }
    
    .error .status-value {
      color: #fc8181;
    }
    
    .button {
      background: #6ee7f7;
      color: #0f172a;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      margin-top: 20px;
      width: 100%;
      font-size: 14px;
    }
    
    .button:hover {
      background: #5dd7e7;
    }
    
    .info-box {
      background: #0f172a;
      border: 1px solid #334155;
      padding: 16px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 13px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 MetaIQ - Health Check</h1>
    
    <div class="info-box">
      ✓ Página carregou corretamente<br>
      ✓ CSS está funcionando<br>
      ✓ JavaScript está ativo
    </div>
    
    <div id="status-backend" class="status-item">
      <span class="status-label">Backend API</span>
      <span class="status-value">Checando...</span>
    </div>
    
    <div id="status-assets" class="status-item">
      <span class="status-label">Assets (CSS/JS)</span>
      <span class="status-value">Checando...</span>
    </div>
    
    <button class="button" onclick="goToDashboard()">Ir para Dashboard</button>
  </div>

  <script>
    console.log('✓ Script iniciado');
    
    // Check Backend
    async function checkBackend() {
      try {
        const response = await fetch('/api/health');
        const data = await response.json();
        document.getElementById('status-backend').innerHTML = `
          <span class="status-label">Backend API</span>
          <span class="status-value">✓ Conectado</span>
        `;
        console.log('✓ Backend respondendo:', data);
      } catch (error) {
        document.getElementById('status-backend').classList.add('error');
        document.getElementById('status-backend').innerHTML = `
          <span class="status-label">Backend API</span>
          <span class="status-value">✗ Erro</span>
        `;
        console.error('✗ Backend não responde:', error);
      }
    }
    
    // Check Assets
    async function checkAssets() {
      try {
        const response = await fetch('/dashboard.css');
        if (response.ok) {
          document.getElementById('status-assets').innerHTML = `
            <span class="status-label">Assets (CSS/JS)</span>
            <span class="status-value">✓ Carregando</span>
          `;
          console.log('✓ CSS carregou');
        }
      } catch (error) {
        console.warn('⚠ Assets não testados:', error);
      }
    }
    
    function goToDashboard() {
      window.location.href = '/dashboard.html';
    }
    
    // Run checks
    window.addEventListener('DOMContentLoaded', () => {
      console.log('✓ DOM pronto');
      checkBackend();
      checkAssets();
    });
  </script>
</body>
</html>

<div class="app-layout" [class.collapsed]="!sidebarOpen()" *ngIf="isAuthenticated$ | async; else noAuth">
  <!-- Sidebar Overlay (Mobile) -->
  <div class="sidebar-overlay" *ngIf="sidebarOverlayOpen()" (click)="closeSidebarOverlay()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="sidebarOpen()">
    <div class="sidebar-topbar">
      <div class="logo-section">
        <h1 class="logo">
          <span>meta</span>IQ
          <span class="version">v2.0</span>
        </h1>
      </div>

      <button
        class="sidebar-control"
        type="button"
        (click)="toggleSidebar()"
        [title]="sidebarOpen() ? 'Fechar sidebar' : 'Abrir sidebar'"
      >
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>
    </div>

    <nav class="nav-menu">
      <a
        *ngFor="let item of getMenu()"
        [routerLink]="item.route"
        class="nav-item"
        [class.active]="isActive(item.route)"
        [title]="item.title"
      >
        <span class="nav-icon">{{ item.icon }}</span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-profile" *ngIf="currentUser$ | async as user">
      <div class="profile-avatar">{{ userInitials(user.name) }}</div>
      <div class="profile-meta">
        <span class="profile-name">{{ user.name }}</span>
        <span class="profile-email">{{ user.email || 'Usuário' }}</span>
        <span class="profile-role">{{ roleLabel(user.role) }}</span>
      </div>
    </div>

    <div class="sidebar-footer"></div>
  </aside>

  <!-- Main Content -->
  <div class="main-wrapper">
    <!-- Header -->
    <header class="app-header">
      <div class="header-content">
        <div class="page-title-container">
          <h2 class="page-title-header">{{ currentTitle }}</h2>
        </div>
        <div class="header-spacer"></div>
        <div class="user-info" *ngIf="currentUser$ | async as user">
          <span class="user-name">{{ user.name }}</span>
        </div>
        <button class="logout-btn" (click)="logout()">
          <span>Sair</span>
        </button>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="app-main">
      <div class="main-container">
        <router-outlet></router-outlet>
      </div>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <p>
        MetaIQ © 2026 · Ambiente de teste ·
        {{ today | date: 'dd/MM/yyyy' }}
      </p>
    </footer>
  </div>
</div>

<!-- Global Components -->
<app-notification-container></app-notification-container>
<app-global-loading></app-global-loading>

<!-- Not Authenticated -->
<ng-template #noAuth>
  <div class="auth-wrapper">
    <router-outlet></router-outlet>
  </div>
</ng-template>

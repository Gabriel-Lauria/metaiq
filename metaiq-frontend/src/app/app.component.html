<div class="app-layout" [class.collapsed]="!sidebarOpen()" *ngIf="isAuthenticated$ | async; else noAuth">
  <!-- Sidebar Overlay (Mobile) -->
  <div class="sidebar-overlay" *ngIf="sidebarOverlayOpen()" (click)="closeSidebarOverlay()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="sidebarOpen()">
    <div class="logo-section">
      <h1 class="logo">
        <span>meta</span>IQ
        <span class="version">v2.0</span>
      </h1>
    </div>

    <nav class="nav-menu">
      <a
        routerLink="/dashboard"
        class="nav-item"
        [class.active]="isActive('/dashboard')"
        title="Dashboard"
      >
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a
        *ngIf="(currentUser$ | async) as navUser"
        routerLink="/campaigns"
        class="nav-item"
        [class.active]="isActive('/campaigns')"
        [hidden]="!canSeeCampaigns(navUser.role)"
        title="Campanhas"
      >
        <span class="nav-icon">📢</span>
        <span class="nav-label">Campanhas</span>
      </a>
    </nav>

    <div class="sidebar-profile" *ngIf="currentUser$ | async as user">
      <div class="profile-avatar">{{ user.name?.split(' ').map(n => n[0]).join('') }}</div>
      <div class="profile-meta">
        <span class="profile-name">{{ user.name }}</span>
        <span class="profile-role">{{ user.role }}</span>
        <span class="profile-email">{{ user.email || 'Usuário' }}</span>
      </div>
    </div>

    <div class="sidebar-footer"></div>
  </aside>

  <!-- Main Content -->
  <div class="main-wrapper">
    <!-- Header -->
    <header class="app-header">
      <div class="header-content">
        <button class="toggle-sidebar" (click)="toggleSidebar()" title="Alternar sidebar">☰</button>
        <div class="page-title-container">
          <h2 class="page-title-header">{{ currentTitle }}</h2>
        </div>
        <div class="header-spacer"></div>
        <div class="user-info" *ngIf="currentUser$ | async as user">
          <span class="user-name">{{ user.name }}</span>
        </div>
        <button class="logout-btn" (click)="logout()">
          <span>Sair</span>
        </button>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="app-main">
      <div class="main-container">
        <router-outlet></router-outlet>
      </div>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <p>
        MetaIQ © 2026 · SQLite Local ·
        {{ today | date: 'dd/MM/yyyy' }}
      </p>
    </footer>
  </div>
</div>

<!-- Global Components -->
<app-notification-container></app-notification-container>
<app-global-loading></app-global-loading>

<!-- Not Authenticated -->
<ng-template #noAuth>
  <div class="auth-wrapper">
    <router-outlet></router-outlet>
  </div>
</ng-template>

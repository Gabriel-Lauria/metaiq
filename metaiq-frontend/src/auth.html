<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MetaIQ - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #0a0d14 0%, #0f1320 100%); color: #e2e8f0; height: 100%; display: flex; align-items: center; justify-content: center; }
    .auth-container { width: 100%; max-width: 400px; padding: 20px; }
    .auth-card { background: #0f1320; border: 1px solid #1e2535; border-radius: 16px; padding: 32px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); }
    .auth-header { text-align: center; margin-bottom: 28px; }
    .logo { font-family: monospace; font-size: 28px; font-weight: 700; margin-bottom: 8px; color: #6ee7f7; }
    .subtitle { font-size: 14px; color: #7a8aa0; }
    .auth-form { display: flex; flex-direction: column; gap: 16px; margin-bottom: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 12px; font-weight: 500; text-transform: uppercase; color: #4a5568; }
    .form-input { background: #0a0d14; border: 1px solid #1e2535; border-radius: 8px; padding: 10px 12px; font-size: 13px; color: #e2e8f0; }
    .form-input:focus { outline: none; border-color: #6ee7f7; }
    .btn { padding: 10px 16px; font-size: 13px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transfer: 0.2s; background: #6ee7f7; color: #0a0d14; }
    .btn:hover { background: #5dd7e7; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .demo-hint { background: #1a2035; border: 1px solid #2d3a50; border-radius: 6px; padding: 8px 12px; text-align: center; margin-bottom: 16px; font-size: 11px; color: #7a8aa0; }
    .error-message { background: rgba(252, 129, 129, 0.1); border: 1px solid rgba(252, 129, 129, 0.2); border-radius: 6px; padding: 10px 12px; font-size: 12px; color: #fc8181; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="logo">metaIQ</h1>
        <p class="subtitle">Faça login na sua conta</p>
      </div>

      <div id="error-message" class="error-message" style="display: none;"></div>

      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-input" placeholder="demo@metaiq.dev" value="demo@metaiq.dev" required>
        </div>

        <div class="form-group">
          <label class="form-label">Senha</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" value="Demo@1234" required>
        </div>

        <div class="demo-hint">
          Demo: demo@metaiq.dev / Demo@1234
        </div>

        <button type="submit" class="btn" id="loginBtn">Entrar</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('error-message');

      errorMsg.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Entrar...';

      try {
        // Use the proxy path (/api/auth/login) which goes through Frontend Express server -> Backend
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Erro ao fazer login');
        }

        // Store tokens
        localStorage.setItem('accessToken', data.accessToken);
        localStorage.setItem('refreshToken', data.refreshToken || '');
        localStorage.setItem('user', JSON.stringify(data.user || {}));

        // Redirect to dashboard
        window.location.href = '/dashboard.html';
      } catch (error) {
        console.error('Login error:', error);
        errorMsg.textContent = error.message || 'Erro ao fazer login. Tente demo@metaiq.dev / Demo@1234';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>

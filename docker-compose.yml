services:
  postgres:
    image: postgres:16-alpine
    container_name: metaiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: metaiq
      POSTGRES_USER: metaiq
      POSTGRES_PASSWORD: metaiq
    ports:
      - "5432:5432"
    volumes:
      - metaiq-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metaiq -d metaiq"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  metaiq-postgres-data:
